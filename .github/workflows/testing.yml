name: testing
permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - run: npm ci
      - run: npm run typecheck && npm run lint && npm run test:unit

  integration:
    needs: fast
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora: [42, 43, 44]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gettext make zip podman

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - run: npm ci

      - name: Cache Podman image layers
        uses: actions/cache@v4
        with:
          path: ~/.local/share/containers/storage
          key: podman-fedora-${{ matrix.fedora }}-${{ hashFiles('test/integration/Containerfile') }}
          restore-keys: |
            podman-fedora-${{ matrix.fedora }}-

      - name: Build integration container image
        run: bash test/integration/build-container.sh ${{ matrix.fedora }}

      - name: Run integration tests
        run: make test-integration FEDORA_VERSION=${{ matrix.fedora }}
