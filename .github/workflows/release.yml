      #     GNOME_EXTENSIONS_TOKEN: ${{ secrets.GNOME_EXTENSIONS_TOKEN }}
      #   run: |
      #     curl -X POST "https://extensions.gnome.org/upload/" \
      #       -H "Authorization: Bearer ${GNOME_EXTENSIONS_TOKEN}" \
      #       -F "file=@anvil@GenKerensky.github.com.zip" \
      #       -F "uuid=anvil@GenKerensky.github.com"
