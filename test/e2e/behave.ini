[behave.formatters]
html-pretty = behave_html_pretty_formatter:PrettyHTMLFormatter

[behave.userdata]
behave.formatter.html-pretty.title_string = Anvil E2E Test Suite
behave.formatter.html-pretty.pseudo_steps = false
behave.formatter.html-pretty.pretty_output = true
behave.formatter.html-pretty.show_summary = false
behave.formatter.html-pretty.show_unexecuted_steps = false
behave.formatter.html-pretty.collapse = auto
behave.formatter.html-pretty.global_summary = true
