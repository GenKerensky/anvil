<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anvil Square Corner Fixture</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: #0d0d16;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: #0d0d16;
      }

      body {
        display: grid;
        grid-template-rows: 44px 1fr;
      }

      .titlebar {
        -webkit-app-region: drag;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        border-bottom: 1px solid #303044;
        border-radius: 0;
        background: #171724;
        user-select: none;
      }

      .controls {
        display: flex;
        gap: 14px;
        color: #dedcf2;
        font-size: 17px;
      }

      main {
        display: grid;
        place-content: center;
        gap: 12px;
        padding: 32px;
        text-align: center;
        background: linear-gradient(90deg, rgb(255 255 255 / 4%) 1px, transparent 1px),
          linear-gradient(rgb(255 255 255 / 4%) 1px, transparent 1px), #0d0d16;
        background-size: 32px 32px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
      }

      p {
        color: #aaa8bc;
      }
    </style>
  </head>
  <body>
    <header class="titlebar">
      <span>Anvil Square Corner Fixture</span>
      <span class="controls" aria-hidden="true"><span>□</span><span>×</span></span>
    </header>
    <main>
      <h1>Square client surface</h1>
      <p>There is no native frame, shadow, transparency, or CSS border radius.</p>
      <p>Any rounded clipping at the outer corners is produced by Anvil.</p>
    </main>
  </body>
</html>
