<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      text { font-family: Inter, system-ui, sans-serif; fill: #e8e8f2; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 17px; fill: #b7b7c9; }
      .label { font-size: 16px; font-weight: 600; }
      .small { font-size: 14px; fill: #c7c7d8; }
      .formula { font-family: ui-monospace, monospace; font-size: 16px; }
      .guide { stroke: #6e6e82; stroke-width: 1.5; stroke-dasharray: 6 6; fill: none; }
      .origin { fill: #ffffff; stroke: #11111a; stroke-width: 2; }
    </style>
    <marker id="arrow-red" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#ec5e5e" />
    </marker>
    <marker id="arrow-cyan" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#42d6e8" />
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#111119" />
  <text x="50" y="52" class="title">Anvil corner geometry — 8× visual scale</text>
  <text x="50" y="82" class="subtitle">Coordinates in labels are logical pixels relative to the window frame.</text>

  <!-- Current/proposed geometry -->
  <g transform="translate(50 120)">
    <rect width="530" height="510" rx="18" fill="#181824" stroke="#333346" />
    <text x="24" y="40" class="title" font-size="22">Current / test geometry</text>
    <text x="24" y="67" class="subtitle">The circles do not have the same center.</text>

    <!-- Border and window boxes. 1 logical px = 8 SVG units. -->
    <rect x="56" y="108" width="360" height="320" fill="none" stroke="#ec5e5e" stroke-width="3" />
    <rect x="80" y="132" width="336" height="296" fill="rgb(66 214 232 / 5%)" stroke="#42d6e8" stroke-width="3" />
    <text x="56" y="450" class="label" fill="#ec5e5e">Border box origin: (−3, −3)</text>
    <text x="80" y="474" class="label" fill="#42d6e8">Window box origin: (0, 0)</text>

    <!-- Origins -->
    <circle cx="56" cy="108" r="5" class="origin" />
    <circle cx="80" cy="132" r="5" class="origin" />
    <text x="18" y="101" class="small">border origin</text>
    <text x="87" y="126" class="small">window origin</text>

    <!-- CSS outer circle: r=18, center=(15,15), scale=8. -->
    <circle cx="200" cy="252" r="144" fill="none" stroke="#ec5e5e" stroke-width="4" />
    <circle cx="200" cy="252" r="6" fill="#ec5e5e" />
    <line x1="200" y1="252" x2="98" y2="150" stroke="#ec5e5e" stroke-width="2.5" marker-end="url(#arrow-red)" />
    <text x="205" y="242" class="label" fill="#ec5e5e">CSS center (15, 15)</text>
    <text x="112" y="207" class="formula" fill="#ec5e5e">r = 18</text>

    <!-- Test mask circle: r=19.5, center=(19.5,19.5), scale=8. -->
    <circle cx="236" cy="288" r="156" fill="none" stroke="#f2c94c" stroke-width="3" stroke-dasharray="9 6" />
    <circle cx="236" cy="288" r="6" fill="#f2c94c" />
    <text x="241" y="310" class="label" fill="#f2c94c">test center (19.5, 19.5)</text>
    <text x="278" y="190" class="formula" fill="#f2c94c">r = 19.5</text>

    <!-- Live mask circle: r=21, center=(21,21), scale=8. -->
    <circle cx="248" cy="300" r="168" fill="none" stroke="#42d6e8" stroke-width="4" />
    <circle cx="248" cy="300" r="6" fill="#42d6e8" />
    <line x1="248" y1="300" x2="129" y2="181" stroke="#42d6e8" stroke-width="2.5" marker-end="url(#arrow-cyan)" />
    <text x="253" y="334" class="label" fill="#42d6e8">live center (21, 21)</text>
    <text x="300" y="220" class="formula" fill="#42d6e8">r = 18 + 3 = 21</text>

    <line x1="200" y1="252" x2="248" y2="300" class="guide" />
    <text x="304" y="378" class="small">Circle centers are displaced diagonally.</text>
  </g>

  <!-- Concentric geometry -->
  <g transform="translate(620 120)">
    <rect width="530" height="510" rx="18" fill="#181824" stroke="#333346" />
    <text x="24" y="40" class="title" font-size="22">Concentric inner-edge geometry</text>
    <text x="24" y="67" class="subtitle">Subtracting the 3 px inset preserves the center.</text>

    <rect x="56" y="108" width="360" height="320" fill="none" stroke="#ec5e5e" stroke-width="3" />
    <rect x="80" y="132" width="336" height="296" fill="rgb(66 214 232 / 5%)" stroke="#42d6e8" stroke-width="3" />

    <circle cx="56" cy="108" r="5" class="origin" />
    <circle cx="80" cy="132" r="5" class="origin" />
    <text x="18" y="101" class="small">border origin</text>
    <text x="87" y="126" class="small">window origin</text>

    <!-- Both circles share center=(15,15) in window coordinates. -->
    <circle cx="200" cy="252" r="144" fill="none" stroke="#ec5e5e" stroke-width="4" />
    <circle cx="200" cy="252" r="120" fill="none" stroke="#42d6e8" stroke-width="4" />
    <circle cx="200" cy="252" r="7" fill="#ffffff" stroke="#111119" stroke-width="2" />

    <line x1="200" y1="252" x2="98" y2="150" stroke="#ec5e5e" stroke-width="2.5" marker-end="url(#arrow-red)" />
    <line x1="200" y1="252" x2="115" y2="167" stroke="#42d6e8" stroke-width="2.5" marker-end="url(#arrow-cyan)" />

    <text x="210" y="246" class="label">shared center (15, 15)</text>
    <text x="272" y="184" class="formula" fill="#ec5e5e">outer r = 18</text>
    <text x="272" y="210" class="formula" fill="#42d6e8">inner r = 18 − 3 = 15</text>

    <path d="M56 108 H80 M56 108 V132" stroke="#f2c94c" stroke-width="3" />
    <text x="62" y="96" class="formula" fill="#f2c94c">3 px inset</text>

    <text x="56" y="450" class="formula" fill="#ec5e5e">−3 + 18 = 15</text>
    <text x="56" y="478" class="formula" fill="#42d6e8">0 + (18 − 3) = 15</text>
  </g>

  <text x="50" y="680" class="subtitle">
    A radius is measured from its own box edge. Equal numeric radii do not imply equal circle centers when box origins differ.
  </text>
</svg>
